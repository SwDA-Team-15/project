<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Express.js — System Context Diagram (C4 Level 1)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d1a;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 24px;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    .wrapper {
      width: 100%;
      max-width: 1250px;
      background: #0d0d1a;
      border-radius: 10px;
      padding: 10px 0 0 0;
    }
    svg { width: 100%; height: auto; display: block; }
  </style>
</head>
<body>
<div class="wrapper">
<svg viewBox="0 0 1200 790" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Arrowhead marker -->
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#777" />
    </marker>
    <!-- Glow filter for Express box -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- ================================================================ -->
  <!--  BACKGROUND                                                       -->
  <!-- ================================================================ -->
  <rect x="0" y="0" width="1200" height="790" fill="#0d0d1a" rx="8" />

  <!-- ================================================================ -->
  <!--  EXTERNAL ACTORS SUBGRAPH                                         -->
  <!-- ================================================================ -->
  <rect x="35" y="28" width="640" height="125" rx="6" ry="6"
        fill="rgba(14,14,32,0.5)" stroke="#444" stroke-width="1" />
  <text x="45" y="47" fill="#999" font-size="13" font-family="Segoe UI, Arial, sans-serif">External Actors</text>

  <!-- A1: Mobile App Users -->
  <rect x="60" y="58" width="138" height="62" rx="5" fill="#1a1a2e" stroke="#555" stroke-width="1" />
  <text x="129" y="84" text-anchor="middle" fill="#fff" font-size="12.5" font-weight="bold">📱 Mobile App</text>
  <text x="129" y="102" text-anchor="middle" fill="#fff" font-size="12.5" font-weight="bold">Users</text>

  <!-- A2: API Consumers -->
  <rect x="214" y="58" width="138" height="62" rx="5" fill="#1a1a2e" stroke="#555" stroke-width="1" />
  <text x="283" y="84" text-anchor="middle" fill="#fff" font-size="12.5" font-weight="bold">🔑 API</text>
  <text x="283" y="102" text-anchor="middle" fill="#fff" font-size="12.5" font-weight="bold">Consumers</text>

  <!-- A3: Web Browser Users -->
  <rect x="368" y="58" width="155" height="62" rx="5" fill="#1a1a2e" stroke="#555" stroke-width="1" />
  <text x="445" y="84" text-anchor="middle" fill="#fff" font-size="12.5" font-weight="bold">🌐 Web Browser</text>
  <text x="445" y="102" text-anchor="middle" fill="#fff" font-size="12.5" font-weight="bold">Users</text>

  <!-- A4: Admin / DevOps -->
  <rect x="539" y="58" width="120" height="62" rx="5" fill="#1a1a2e" stroke="#555" stroke-width="1" />
  <text x="599" y="82" text-anchor="middle" fill="#fff" font-size="12.5" font-weight="bold">⚙️ Admin /</text>
  <text x="599" y="100" text-anchor="middle" fill="#fff" font-size="12.5" font-weight="bold">DevOps</text>

  <!-- ================================================================ -->
  <!--  CONNECTION LINES:  Actors → Express                              -->
  <!-- ================================================================ -->

  <!-- A1 → Express -->
  <line x1="129" y1="120" x2="129" y2="172" stroke="#777" stroke-width="1" />
  <line x1="129" y1="200" x2="630" y2="278" stroke="#777" stroke-width="1" marker-end="url(#arrow)" />

  <!-- A2 → Express -->
  <line x1="283" y1="120" x2="283" y2="172" stroke="#777" stroke-width="1" />
  <line x1="283" y1="200" x2="660" y2="278" stroke="#777" stroke-width="1" marker-end="url(#arrow)" />

  <!-- A3 → Express (HTTP/HTTPS) -->
  <line x1="445" y1="120" x2="445" y2="168" stroke="#777" stroke-width="1" />
  <line x1="445" y1="200" x2="695" y2="278" stroke="#777" stroke-width="1" marker-end="url(#arrow)" />

  <!-- A4 → Express (Deploy/Config) -->
  <line x1="599" y1="120" x2="720" y2="195" stroke="#777" stroke-width="1" />
  <line x1="720" y1="215" x2="720" y2="278" stroke="#777" stroke-width="1" marker-end="url(#arrow)" />

  <!-- ================================================================ -->
  <!--  EDGE LABELS:  Actors → Express                                   -->
  <!-- ================================================================ -->

  <!-- Label: REST API Calls (JSON) -->
  <rect x="60" y="165" width="138" height="38" rx="3" fill="#0d0d1a" stroke="#555" stroke-width="0.8" />
  <text x="129" y="181" text-anchor="middle" fill="#ccc" font-size="10.5">REST API Calls</text>
  <text x="129" y="196" text-anchor="middle" fill="#ccc" font-size="10.5">(JSON)</text>

  <!-- Label: API Requests (Bearer Token) -->
  <rect x="210" y="165" width="146" height="38" rx="3" fill="#0d0d1a" stroke="#555" stroke-width="0.8" />
  <text x="283" y="181" text-anchor="middle" fill="#ccc" font-size="10.5">API Requests</text>
  <text x="283" y="196" text-anchor="middle" fill="#ccc" font-size="10.5">(Bearer Token)</text>

  <!-- Label: HTTP/HTTPS Requests (HTML, Forms) -->
  <rect x="368" y="165" width="172" height="38" rx="3" fill="#0d0d1a" stroke="#555" stroke-width="0.8" />
  <text x="454" y="181" text-anchor="middle" fill="#ccc" font-size="10.5">HTTP/HTTPS Requests</text>
  <text x="454" y="196" text-anchor="middle" fill="#ccc" font-size="10.5">(HTML, Forms)</text>

  <!-- Label: Deploy / Config -->
  <rect x="668" y="180" width="105" height="28" rx="3" fill="#0d0d1a" stroke="#555" stroke-width="0.8" />
  <text x="720" y="199" text-anchor="middle" fill="#ccc" font-size="10.5">Deploy / Config</text>

  <!-- ================================================================ -->
  <!--  SYSTEM BOUNDARY SUBGRAPH                                         -->
  <!-- ================================================================ -->
  <rect x="540" y="238" width="380" height="215" rx="6" ry="6"
        fill="rgba(14,14,32,0.6)" stroke="#444" stroke-width="1" />
  <text x="550" y="258" fill="#999" font-size="13" font-family="Segoe UI, Arial, sans-serif">System Boundary</text>

  <!-- Express.js Application box -->
  <rect x="575" y="275" width="310" height="155" rx="8" ry="8"
        fill="#151530" stroke="#556" stroke-width="1.5" filter="url(#glow)" />
  <text x="730" y="302" text-anchor="middle" fill="#fff" font-size="13.5" font-weight="bold"><tspan fill="#ff9800">●</tspan> Express.js Application</text>
  <text x="730" y="322" text-anchor="middle" fill="#aaa" font-size="12" font-style="italic">Node.js Web Framework</text>
  <text x="730" y="345" text-anchor="middle" fill="#bbb" font-size="11.5">Handles HTTP requests,</text>
  <text x="730" y="362" text-anchor="middle" fill="#bbb" font-size="11.5">routes, middleware pipeline,</text>
  <text x="730" y="379" text-anchor="middle" fill="#bbb" font-size="11.5">and response generation</text>

  <!-- ================================================================ -->
  <!--  CONNECTION LINES:  Express → External Systems                    -->
  <!-- ================================================================ -->

  <!-- Express → S1 (CDN/Proxy) -->
  <polyline points="680,430 680,485 115,485 115,500" fill="none" stroke="#777" stroke-width="1" />
  <line x1="115" y1="528" x2="115" y2="590" stroke="#777" stroke-width="1" marker-end="url(#arrow)" />

  <!-- Express → S2 (Monitoring) -->
  <polyline points="695,430 695,475 275,475 275,500" fill="none" stroke="#777" stroke-width="1" />
  <line x1="275" y1="528" x2="275" y2="590" stroke="#777" stroke-width="1" marker-end="url(#arrow)" />

  <!-- Express → S3 (Database) -->
  <line x1="710" y1="430" x2="440" y2="500" stroke="#777" stroke-width="1" />
  <line x1="440" y1="528" x2="440" y2="590" stroke="#777" stroke-width="1" marker-end="url(#arrow)" />

  <!-- Express → S4 (Cloud Storage) -->
  <line x1="725" y1="430" x2="600" y2="500" stroke="#777" stroke-width="1" />
  <line x1="600" y1="528" x2="600" y2="590" stroke="#777" stroke-width="1" marker-end="url(#arrow)" />

  <!-- Express → S5 (Email Service) -->
  <line x1="740" y1="430" x2="760" y2="500" stroke="#777" stroke-width="1" />
  <line x1="760" y1="528" x2="760" y2="590" stroke="#777" stroke-width="1" marker-end="url(#arrow)" />

  <!-- Express → S6 (Payment Gateway) -->
  <polyline points="755,430 755,475 920,475 920,500" fill="none" stroke="#777" stroke-width="1" />
  <line x1="920" y1="528" x2="920" y2="590" stroke="#777" stroke-width="1" marker-end="url(#arrow)" />

  <!-- Express → S7 (Auth Provider) -->
  <polyline points="770,430 770,485 1080,485 1080,500" fill="none" stroke="#777" stroke-width="1" />
  <line x1="1080" y1="528" x2="1080" y2="590" stroke="#777" stroke-width="1" marker-end="url(#arrow)" />

  <!-- ================================================================ -->
  <!--  EDGE LABELS:  Express → External Systems                         -->
  <!-- ================================================================ -->

  <!-- Label: Proxied Requests -->
  <rect x="44" y="500" width="142" height="28" rx="3" fill="#0d0d1a" stroke="#555" stroke-width="0.8" />
  <text x="115" y="519" text-anchor="middle" fill="#ccc" font-size="10.5">Proxied Requests</text>

  <!-- Label: Logs & Metrics -->
  <rect x="206" y="500" width="128" height="28" rx="3" fill="#0d0d1a" stroke="#555" stroke-width="0.8" />
  <text x="270" y="519" text-anchor="middle" fill="#ccc" font-size="10.5">Logs &amp; Metrics</text>

  <!-- Label: SQL / NoSQL Queries -->
  <rect x="367" y="500" width="148" height="28" rx="3" fill="#0d0d1a" stroke="#555" stroke-width="0.8" />
  <text x="441" y="519" text-anchor="middle" fill="#ccc" font-size="10.5">SQL / NoSQL Queries</text>

  <!-- Label: File Upload/Download -->
  <rect x="524" y="500" width="152" height="28" rx="3" fill="#0d0d1a" stroke="#555" stroke-width="0.8" />
  <text x="600" y="519" text-anchor="middle" fill="#ccc" font-size="10.5">File Upload/Download</text>

  <!-- Label: Send Notifications -->
  <rect x="688" y="500" width="144" height="28" rx="3" fill="#0d0d1a" stroke="#555" stroke-width="0.8" />
  <text x="760" y="519" text-anchor="middle" fill="#ccc" font-size="10.5">Send Notifications</text>

  <!-- Label: Process Payments -->
  <rect x="848" y="500" width="144" height="28" rx="3" fill="#0d0d1a" stroke="#555" stroke-width="0.8" />
  <text x="920" y="519" text-anchor="middle" fill="#ccc" font-size="10.5">Process Payments</text>

  <!-- Label: Token Validation -->
  <rect x="1010" y="500" width="138" height="28" rx="3" fill="#0d0d1a" stroke="#555" stroke-width="0.8" />
  <text x="1079" y="519" text-anchor="middle" fill="#ccc" font-size="10.5">Token Validation</text>

  <!-- ================================================================ -->
  <!--  EXTERNAL SYSTEMS SUBGRAPH                                        -->
  <!-- ================================================================ -->
  <rect x="25" y="555" width="1150" height="145" rx="6" ry="6"
        fill="rgba(14,14,32,0.5)" stroke="#444" stroke-width="1" />
  <text x="35" y="575" fill="#999" font-size="13" font-family="Segoe UI, Arial, sans-serif">External Systems</text>

  <!-- S1: CDN / Proxy -->
  <rect x="42" y="590" width="148" height="75" rx="5" fill="#1a1a2e" stroke="#555" stroke-width="1" />
  <text x="116" y="617" text-anchor="middle" fill="#fff" font-size="11.5" font-weight="bold">🌐 CDN / Proxy</text>
  <text x="116" y="638" text-anchor="middle" fill="#aaa" font-size="11">Nginx / Cloudflare</text>

  <!-- S2: Monitoring -->
  <rect x="202" y="590" width="148" height="75" rx="5" fill="#1a1a2e" stroke="#555" stroke-width="1" />
  <text x="276" y="617" text-anchor="middle" fill="#fff" font-size="11.5" font-weight="bold">📊 Monitoring</text>
  <text x="276" y="638" text-anchor="middle" fill="#aaa" font-size="11">Sentry / Datadog</text>

  <!-- S3: Database (Cylinder shape) -->
  <!-- Cylinder body -->
  <rect x="370" y="602" width="140" height="58" fill="#1a1a3e" stroke="none" />
  <line x1="370" y1="602" x2="370" y2="660" stroke="#666" stroke-width="1" />
  <line x1="510" y1="602" x2="510" y2="660" stroke="#666" stroke-width="1" />
  <!-- Cylinder top ellipse -->
  <ellipse cx="440" cy="602" rx="70" ry="14" fill="#1a1a3e" stroke="#666" stroke-width="1" />
  <!-- Cylinder bottom arc -->
  <path d="M370,660 A70,14 0 0,0 510,660" fill="#1a1a3e" stroke="#666" stroke-width="1" />
  <!-- Cylinder text -->
  <text x="440" y="628" text-anchor="middle" fill="#fff" font-size="11.5" font-weight="bold">🗄️ Database</text>
  <text x="440" y="650" text-anchor="middle" fill="#aaa" font-size="10.5">PostgreSQL / MongoDB</text>

  <!-- S4: Cloud Storage -->
  <rect x="528" y="590" width="148" height="75" rx="5" fill="#1a1a2e" stroke="#555" stroke-width="1" />
  <text x="602" y="617" text-anchor="middle" fill="#fff" font-size="11.5" font-weight="bold">⚫ Cloud Storage</text>
  <text x="602" y="638" text-anchor="middle" fill="#aaa" font-size="11">S3 / GCS</text>

  <!-- S5: Email Service -->
  <rect x="688" y="590" width="148" height="75" rx="5" fill="#1a1a2e" stroke="#555" stroke-width="1" />
  <text x="762" y="617" text-anchor="middle" fill="#fff" font-size="11.5" font-weight="bold">📧 Email Service</text>
  <text x="762" y="638" text-anchor="middle" fill="#aaa" font-size="11">SendGrid / SES</text>

  <!-- S6: Payment Gateway -->
  <rect x="848" y="590" width="155" height="75" rx="5" fill="#1a1a2e" stroke="#555" stroke-width="1" />
  <text x="925" y="617" text-anchor="middle" fill="#fff" font-size="11.5" font-weight="bold">💳 Payment Gateway</text>
  <text x="925" y="638" text-anchor="middle" fill="#aaa" font-size="11">Stripe</text>

  <!-- S7: Auth Provider -->
  <rect x="1015" y="590" width="145" height="75" rx="5" fill="#1a1a2e" stroke="#555" stroke-width="1" />
  <text x="1088" y="617" text-anchor="middle" fill="#fff" font-size="11.5" font-weight="bold">🔒 Auth Provider</text>
  <text x="1088" y="638" text-anchor="middle" fill="#aaa" font-size="11">OAuth / JWT</text>

</svg>
</div>
</body>
</html>
